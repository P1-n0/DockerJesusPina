name: Comprobaciones de Compilacion jijijuaz

on:
  push:
    branches: [ "main" ]

jobs:
  comprobacion-build:
    name: Validar con docker/build
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo del repositorio
        uses: actions/checkout@v4
        
      - name: Configurar motor Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Ejecutar comprobacion (docker/build)
        uses: docker/build-push-action@v6
        with:
          context: .
          call: check

  comprobacion-bake:
    name: Validar con docker/bake
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo del repositorio
        uses: actions/checkout@v4
        
      - name: Configurar motor Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Ejecutar comprobacion (docker/bake)
        uses: docker/bake-action@v5
        with:
          targets: validate-build
